steps:
  # Build backend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/backend:latest', 
      './backend'
    ]

  # Push backend image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/backend:latest'
    ]

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'sofiarahul-backend',
      '--image', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/backend:latest',
      '--region', 'northamerica-northeast2',
      '--allow-unauthenticated'
    ]

options:
  logging: CLOUD_LOGGING_ONLY